<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Lista Maestro-Curso</title></head>
<body>
  <h2>Lista de Maestros con sus Cursos</h2>

  <table border="1">
    <thead>
      <tr>
        <th>Maestro</th>
        <th>Especialidad</th>
        <th>Cursos</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="m : ${lista_maestros}">
        <td th:text="${m.datosPersonales.nombre_persona + ' ' + m.datosPersonales.apellido_persona}"></td>
        <td th:text="${m.especialidad}"></td>
        <td>
          <ul>
            <li th:each="c : ${m.cursos}">
              <span th:text="${c.nombre_curso}"></span><br>
              <small th:text="${'(' + c.division.nombre_division + ')'}"></small>

              <form th:action="@{/curso/editar_maestro_curso}" method="post" style="display:inline;">
                <input type="hidden" name="idsCurso" th:value="${c.id_curso}">
                <input type="hidden" name="idMaestro" th:value="${m.id_maestro}">
                <input type="submit" value="Editar">
              </form>

              <form th:action="@{/curso/eliminar_maestro_curso}" method="post" style="display:inline;"
                    onsubmit="return confirm('Quitar este curso del maestro?');">
                <input type="hidden" name="idsCurso" th:value="${c.id_curso}">
                <input type="hidden" name="idMaestro" th:value="${m.id_maestro}">
                <input type="submit" value="Eliminar">
              </form>
            </li>
            <li th:if="${#lists.isEmpty(m.cursos)}">Sin cursos</li>
          </ul>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(lista_maestros)}">
        <td colspan="3">No hay maestros registrados.</td>
      </tr>
    </tbody>
  </table>

  <br>
  <form th:action="@{/}" method="post">
    <input type="submit" value="Regresar al Inicio">
  </form>
</body>
</html>
